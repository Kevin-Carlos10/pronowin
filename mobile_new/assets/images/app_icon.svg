<svg width="1024" height="1024" viewBox="0 0 1024 1024" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      @font-face {
        font-family: 'Rajdhani';
        font-weight: 700;
        src: url('data:font/woff;base64,') format('woff');
      }
    </style>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#FF9500"/>
      <stop offset="100%" stop-color="#E05000"/>
    </linearGradient>
  </defs>

  <!-- fond orange -->
  <rect width="1024" height="1024" rx="230" fill="url(#bg)"/>

  <!-- corps de la coupe -->
  <path d="M270,190 L754,190 Q740,530 512,540 Q284,530 270,190 Z"
    fill="white" opacity="0.95"/>

  <!-- anse gauche -->
  <path d="M270,260 Q160,260 160,390 Q160,490 300,500"
    fill="none" stroke="white" stroke-width="52" stroke-linecap="round" opacity="0.95"/>

  <!-- anse droite -->
  <path d="M754,260 Q864,260 864,390 Q864,490 724,500"
    fill="none" stroke="white" stroke-width="52" stroke-linecap="round" opacity="0.95"/>

  <!-- tige -->
  <rect x="462" y="535" width="100" height="160" rx="10" fill="white" opacity="0.95"/>

  <!-- socle -->
  <rect x="320" y="685" width="384" height="70" rx="20" fill="white" opacity="0.95"/>

  <!-- P dans la coupe -->
  <text x="512" y="490" text-anchor="middle" fill="#E05000"
    font-size="290" font-weight="700" font-family="Rajdhani, sans-serif">P</text>

</svg>